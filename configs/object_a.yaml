# configs/object_a.yaml — 2DGS training config for Object A (real capture)
data:
  source_path: "data/object_a"
  images: "data/object_a/images"
  model_path: "outputs/object_a"
  resolution: [800, 1200]      # downsample to save VRAM, use -1 for original

model:
  sh_degree: 3

optim:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 1.6e-06
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

pipeline:
  convert_SHs_python: false
  compute_cov3D_python: false
  debug: false
