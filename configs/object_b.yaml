# configs/object_b.yaml — threestudio config for Object B (text-to-3D)
text_prompt: "A wooden treasure chest with gold trim, photorealistic, 360 degree"
model_name: "runwayml/stable-diffusion-v1-5"

system:
  guidance_type: "stable-diffusion-guidance"
  guidance:
    pretrained_model_name_or_path: "stabilityai/stable-diffusion-2-1-base"
    guidance_scale: 100.0
    min_step_percent: 0.02
    max_step_percent: 0.98
  geometry_type: "implicit-volume"
  geometry:
    radius: 1.0
    isosurface_method: "mc"
    isosurface_resolution: 128
  material_type: "diffuse-with-point-light"
  background_color: [1.0, 1.0, 1.0]

optim:
  iterations: 10000
  lr: 0.001

render:
  resolution: [64, 64]
  batch_size: 4

export:
  mesh_path: "outputs/object_b/object_b.obj"
  texture_path: "outputs/object_b/object_b_texture.png"

# Note: threestudio exports a textured mesh (.obj + .png texture).
# Run scripts/object_b/mesh_to_gaussian.py to convert to Gaussian Splatting .ply
# for fusion with the other assets (fusion.yaml expects outputs/object_b/object_b.ply).
